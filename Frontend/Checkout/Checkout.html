<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="./Checkout.css" rel="stylesheet" />
</head>

<body class="bg-black">
    <nav class="navbar navbar-expand-md fixed-top bg-black border-1 border-bottom border-secondary py-2">
        <div class="container-fluid">
            <div class="navbar-brand text-white">
                <i class="bi bi-shop fs-3 pe-3"></i>
                <span>Urban Store</span>
            </div>

            <div class="text-white d-flex gap-2 me-4 align-items-center" id="cartBtn">
                <span class="">
                    <i class="bi bi-arrow-left fs-3"></i>
                </span>
                <span class="fs-5">Back to Cart</span>
            </div>
        </div>
    </nav>

    <h1 class="fs-1 text-white fw-bolder checkout-title p-2">Checkout</h1>
    <p class="ms-4 ps-3 text-white"><i class="bi bi-lock"></i> Secure checkout</p>

    <!-- Info Summary -->
    <div class="row d-flex flex-wrap gap-2">
        <div class="container-fluid col-7 d-flex flex-column p-4 text-white">
            <span class="d-flex flex-column bg-dark text-white p-4 rounded-2">
                <h4 class="mb-3">Contact Information</h4>
                <label class="text-secondary">Email</label>
                <input class="bg-secondary text-black rounded-2" type="text" placeholder="your@email.com" />
            </span>
            <span class="d-flex flex-column bg-dark text-white p-4 mt-4 rounded-2">
                <h4>Shipping Address</h4>

                <label>Full Name</label>
                <input class="bg-secondary text-black rounded-2 mb-2" type="text" placeholder="Eric Mothupi" />

                <label>Address</label>
                <input class="bg-secondary text-black rounded-2 mb-2" type="text" placeholder="123 Main Street" />

                <label>City And State</label>
                <input class="bg-secondary text-black rounded-2 mb-2" type="text" placeholder="Krugersdorp, Kagiso" />

                <label>ZIP Code</label>
                <input class="bg-secondary text-black rounded-2 mb-2" type="text" placeholder="1752" />
            </span>
            <span class="d-flex flex-column bg-dark text-white p-4 mt-4 rounded-2">
                <h4 class="mb-3">Payment Details</h4>

                <label>Name on Card</label>
                <input class="bg-secondary text-black rounded-2 mb-2" type="text" placeholder="E Mothupi" />

                <label>Card Number</label>
                <input class="bg-secondary text-black rounded-2 mb-2" type="text" placeholder="1234 5678 9012 3456" />

                <label>Expiry Date</label>
                <input class="bg-secondary text-black rounded-2 mb-2" type="text" placeholder="MM/YY" />

                <label>CVV</label>
                <input class="bg-secondary text-black rounded-2" type="text" placeholder="123" />
            </span>
        </div>

        <!-- Order Summary -->
        <div class="container-fluid col-4 bg-dark p-4 d-flex flex-column align-items-center rounded-2">
            <h1 class="text-white p-2 mb-4">Order Summary</h1>

            <div
                class="productDetails container-fluid d-flex flex-column p-2 text-white border-bottom border-1 border-secondary">
            </div>

            <div class="container-fluid border-bottom border-1 border-secondary text-white mt-2 p-2">
                <span class="d-flex justify-content-between align-items-center">
                    <p>Subtotal</p>
                    <p class="subtotal"></p>
                </span>
                <span class="d-flex justify-content-between align-items-center">
                    <p>Shipping</p>
                    <p class="shipping"></p>
                </span>
                <span class="d-flex justify-content-between align-items-center">
                    <p>Tax(8%)</p>
                    <p class="tax"></p>
                </span>
                <span class="d-flex justify-content-between align-items-center">
                    <p class="fw-bold text-white fs-4">Total</p>
                    <p class="total"></p>
                </span>
            </div>
            <button class="btn btn-light btn-lg px-5 py-2 mt-4" type="button" id="OrderPlacement"><i class="bi bi-lock"></i>
                Place Order</button>
            <p class="text-secondary fs-6 mt-1 ms-5 ps-2">No real payment will be made/processed</p>
        </div>
    </div>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="./Checkout.js"></script>
</body>

</html>
