<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link href="./cart.css" rel="stylesheet" />
</head>
<body class="bg-black">
    <nav class="navbar navbar-expand-md fixed-top bg-black border-1 border-bottom border-secondary py-2">
       <div class="container-fluid">
            <div class="navbar-brand text-white">
                <i class="bi bi-shop fs-3 pe-3"></i>
                <span>Urban Store</span>
            </div>

            <div class="text-white d-flex gap-2 me-4 align-items-center">
                <span class="cursor-pointer" id="shopNav">
                    <i class="bi bi-arrow-left fs-3"></i>
                </span>
                <span class="fs-5">Continue Shopping</span>
            </div>
        </div>
    </nav>

    <h1 class="fs-1 text-white fw-bolder cart-title p-2">Cart</h1>
    <p class="ms-4 ps-3 text-white"><span class="itemCount">0</span> items in your cart</p>

    <div class="container-fluid d-flex flex-wrap gap-5 p-4 justify-content-center align-items-center" id="big-container">
        <div class="items-container d-flex flex-column justify-content-center align-items-center p-2"> 
        </div>

        <div class="bg-dark d-flex flex-column p-4 border border-secondary justify-content-center" id="order-summary">
            <h1 class="text-white p-2 mb-4">Order Summary</h1>
            <span class="d-flex justify-content-between align-items-center text-white">
                <p>Subtotal</p>
                <p class="subTotal"></p>
            </span>
            <span class="d-flex justify-content-between align-items-center text-white">
                <p>Shipping</p>
                <p class="shippingFee"></p>
            </span>
            <span class="d-flex justify-content-between align-items-center text-white">
                <p>Tax</p>
                <p class="taxFee"></p>
            </span>
            <span class="d-flex justify-content-between align-items-center text-white border-1 border-secondary border-top border-bottom pt-2">
                <h2>Total</h2>
                <p class="totalPrice"></p>
            </span>
            <span class="d-flex gap-2 justify-content-center align-items-center mt-4 pt-4">
                <button class="btn btn-light btn-lg m-2 px-4" id="checkoutBtn">Checkout</button>
                <button class="btn btn-dark bg-black btn-lg m-2" id="shoppingBtn">Continue Shopping</button>
            </span>
            
        </div>
    </div>

    <section class="container-fluid bg-black text-white py-3">
        <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center">
            <div>
                <i class="bi bi-shop fs-3 me-2"></i>
                <span class="fs-4">Urban Store</span>
            </div>

            <p class="mb-0 mt-2 mt-md-0">© 2026 Urban Store. All rights reserved</p>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script type="module" src="./Cart.js"></script>
    <!-- <script type="module" src="./cartModule.js"></script> -->

</body>
</html>
