    <title>Urban Store</title>

<body class="bg-black text-white">
    <nav class="navbar navbar-expand-md fixed-top bg-black border-1 border-bottom border-secondary py-2">
        <div class="container-fluid">
            <div class="navbar-brand text-white">
                <i class="bi bi-shop fs-3 pe-3"></i>
                <span>Urban Store</span>
            </div>

            <div class="text-white d-flex gap-4 me-4 align-items-center">
                <span class="cart">
                    <i class="bi bi-cart fs-3"></i>
                    <p class="productNumb position-absolute z-3 top-2 bg-white text-black fw-bold rounded-pill top-0 px-1 ms-3 mt-3"></p>
                </span>
                <span class="fs-5" id="login"></span>
            </div>
        </div>
    </nav>
    
    <h1 class="fs-1 text-white fw-bolder shop-title p-2">Shop</h1>
    <p class="ms-4 ps-3"><span class="productCount"></span> products available</p>

    <div class="container-fluid ms-4 p-3">
        <span class="border border-1 border-secondary py-2 px-3 rounded-4 search-container">
            <i class="bi bi-search me-2"></i>
            <input class="search-input bg-black text-white border border-0 pe-4" type="search" placeholder="Search products.." />
        </span>
    </div>

    <section class="container-fluid mt-3 ms-4 ps-4">
        <span class="me-3">
            <i class="bi bi-funnel me-2"></i>
            Filter: 
        </span>
        <button class="all-products btn btn-light p-2 me-2">All Products</button>
        <button class="hoodiesBtn btn btn-dark bg-black p-2 me-2">Hoodies</button>
        <button class="t-shirtsBtn btn btn-dark bg-black p-2 me-2">T-Shirts</button>
        <button class="PantsBtn btn btn-dark bg-black p-2 me-2">Pants</button>
    </section>

    <section class="products-details container-fluid mt-4 py-2">
        <div id="product-container" class="">          
        </div>
    </section>

    <section class="container-fluid bg-black text-white py-3">
        <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center">
            <div>
                <i class="bi bi-shop fs-3 me-2"></i>
                <span class="fs-4">Urban Store</span>
            </div>

            <p class="mb-0 mt-2 mt-md-0">© 2026 Urban Store. All rights reserved</p>
        </div>
    </section>
